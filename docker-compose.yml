services:
  db:
    image: postgres:16-alpine
    container_name: cadastroigreja-db
    environment:
      POSTGRES_DB: cadastroigreja
      POSTGRES_USER: cadastroigreja
      POSTGRES_PASSWORD: cadastroigreja_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cadastroigreja -d cadastroigreja"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
